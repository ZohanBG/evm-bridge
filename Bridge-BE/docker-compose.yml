version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bridge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: bridge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/bridge_db?schema=public"
    ports:
      - "3000:3000"

  indexer:
    build: .
    container_name: bridge-indexer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/bridge_db?schema=public"
    command: ["node", "dist/indexer/main.js"]

volumes:
  postgres_data:
